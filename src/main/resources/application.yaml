spring:
  application:
    name:
      cloud-file-storage

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  session:
    timeout: 30m
    data:
      redis:
        namespace: cloud-file-storage:session

server:
  port: 8080
  servlet:
    session:
      cookie:
        name: JSESSIONID

minio:
  bucket: ${MINIO_BUCKET}
  internalUrl: ${MINIO_INTERNAL_URL}
  publicUrl: ${MINIO_PUBLIC_URL}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}

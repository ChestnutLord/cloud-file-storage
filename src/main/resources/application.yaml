minio:
  bucket: ${MINIO_BUCKET}
  internalUrl: ${MINIO_INTERNAL_URL}
  publicUrl: ${MINIO_PUBLIC_URL}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
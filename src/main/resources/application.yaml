spring:
  application:
    name:
      cloud-file-storage

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

